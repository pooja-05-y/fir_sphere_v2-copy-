name: fitsphere
description: FitSphere - Track your wellness journey

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  fl_chart: ^0.66.2
  percent_indicator: ^4.2.3
  cupertino_icons: ^1.0.2
  pedometer: ^4.0.2
  sensors_plus: ^4.0.2
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  provider: ^6.1.1
  flutter_local_notifications: ^17.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
